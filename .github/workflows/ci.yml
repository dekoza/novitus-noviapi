name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --frozen --all-groups

      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files

      - name: Run test suite
        run: >-
          uv run pytest tests/contract tests/unit tests/integration
          --ignore=tests/unit/test_artifacts.py -x

      - name: Build artifacts
        run: uv build --no-sources --clear

      - name: Verify artifact contents
        run: uv run pytest tests/unit/test_artifacts.py -x

      - name: Smoke-test wheel install
        run: |
          uv venv build/rc-smoke-wheel --clear --no-project
          uv pip install --python build/rc-smoke-wheel dist/*.whl
          build/rc-smoke-wheel/bin/python -m noviapi._release_smoke

      - name: Smoke-test sdist install
        run: |
          uv venv build/rc-smoke-sdist --clear --no-project
          uv pip install --python build/rc-smoke-sdist dist/*.tar.gz
          build/rc-smoke-sdist/bin/python -m noviapi._release_smoke
